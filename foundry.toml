[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read-write", path = "deployments/" }]

[fuzz]
runs = 256

[invariant]
runs = 256
depth = 15

[profile.ci]
fuzz = { runs = 5000 }
invariant = { runs = 1000, depth = 30 }
