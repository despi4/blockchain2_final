specVersion: 0.0.5
schema:
  file: ./schema.graphql

dataSources:
  # ── AMM ──────────────────────────────────────────────────────────────────────
  - kind: ethereum
    name: GameFiAMM
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000002"  # replace after deploy
      abi: GameFiAMM
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Swap
        - VaultDayData
      abis:
        - name: GameFiAMM
          file: ./abis/GameFiAMM.json
      eventHandlers:
        - event: Swap(indexed address,uint256,uint256,uint256,uint256,indexed address)
          handler: handleSwap
      file: ./src/amm.ts

  # ── Governor ─────────────────────────────────────────────────────────────────
  - kind: ethereum
    name: GameFiGovernor
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000004"  # replace after deploy
      abi: GameFiGovernor
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Proposal
        - Vote
      abis:
        - name: GameFiGovernor
          file: ./abis/GameFiGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
        - event: ProposalQueued(uint256,uint256)
          handler: handleProposalQueued
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
        - event: ProposalCanceled(uint256)
          handler: handleProposalCanceled
      file: ./src/governor.ts

  # ── Governance Token (ERC20Votes) ─────────────────────────────────────────────
  - kind: ethereum
    name: GameFiToken
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000001"  # replace after deploy
      abi: GameFiToken
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TokenHolder
      abis:
        - name: GameFiToken
          file: ./abis/GameFiToken.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: DelegateChanged(indexed address,indexed address,indexed address)
          handler: handleDelegateChanged
        - event: DelegateVotesChanged(indexed address,uint256,uint256)
          handler: handleDelegateVotesChanged
      file: ./src/token.ts

  # ── Loot Drop (VRF) ──────────────────────────────────────────────────────────
  - kind: ethereum
    name: GameFiLoot
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000007"  # replace after deploy
      abi: GameFiLoot
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - LootDrop
      abis:
        - name: GameFiLoot
          file: ./abis/GameFiLoot.json
      eventHandlers:
        - event: LootRequested(indexed address,indexed uint256)
          handler: handleLootRequested
        - event: LootFulfilled(indexed uint256,uint256[],uint256[])
          handler: handleLootFulfilled
      file: ./src/loot.ts

  # ── Crafting ──────────────────────────────────────────────────────────────────
  - kind: ethereum
    name: GameFiCrafting
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000008"  # replace after deploy
      abi: GameFiCrafting
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - CraftingEvent
      abis:
        - name: GameFiCrafting
          file: ./abis/GameFiCrafting.json
      eventHandlers:
        - event: ItemCrafted(indexed address,uint256[],uint256[],uint256,uint256)
          handler: handleItemCrafted
      file: ./src/crafting.ts
