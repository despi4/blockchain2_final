specVersion: 0.0.5
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: ResourceAMM
    network: arbitrum-sepolia
    source:
      address: "0x1f35Ec70fcF576ef585fF923F9479df54427fa98"
      abi: ResourceAMM
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Swap
      abis:
        - name: ResourceAMM
          file: ./abis/ResourceAMM.json
      eventHandlers:
        - event: Swap(indexed address,indexed address,indexed address,uint256,uint256,address)
          handler: handleSwap
      file: ./src/amm.ts

  - kind: ethereum
    name: GameFiGovernor
    network: arbitrum-sepolia
    source:
      address: "0xEd011c6397B2BEB7f2cc43892C492604165bBAdB"
      abi: GameFiGovernor
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Proposal
        - Vote
      abis:
        - name: GameFiGovernor
          file: ./abis/GameFiGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
        - event: ProposalQueued(uint256,uint256)
          handler: handleProposalQueued
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
        - event: ProposalCanceled(uint256)
          handler: handleProposalCanceled
      file: ./src/governor.ts

  - kind: ethereum
    name: GameGovernanceToken
    network: arbitrum-sepolia
    source:
      address: "0x8c0af3d55Be9B86C3c74B3c706Fc38409A703D20"
      abi: GameGovernanceToken
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TokenHolder
      abis:
        - name: GameGovernanceToken
          file: ./abis/GameGovernanceToken.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: DelegateChanged(indexed address,indexed address,indexed address)
          handler: handleDelegateChanged
        - event: DelegateVotesChanged(indexed address,uint256,uint256)
          handler: handleDelegateVotesChanged
      file: ./src/token.ts

  - kind: ethereum
    name: LootDrop
    network: arbitrum-sepolia
    source:
      address: "0x586d17959de7585A9eD06C34288f2C1Eb7854093"
      abi: LootDrop
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - LootDrop
      abis:
        - name: LootDrop
          file: ./abis/LootDrop.json
      eventHandlers:
        - event: LootRequested(indexed uint256,indexed address,uint256)
          handler: handleLootRequested
        - event: LootFulfilled(indexed uint256,indexed address,indexed uint256,uint256)
          handler: handleLootFulfilled
      file: ./src/loot.ts

  - kind: ethereum
    name: CraftingSystem
    network: arbitrum-sepolia
    source:
      address: "0x393825Ac24DAcF19616b46F7C5eafa415BEB5424"
      abi: CraftingSystem
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - CraftingEvent
      abis:
        - name: CraftingSystem
          file: ./abis/CraftingSystem.json
      eventHandlers:
        - event: Crafted(indexed address,indexed uint256,uint256,indexed uint256,uint256)
          handler: handleCrafted
      file: ./src/crafting.ts

  - kind: ethereum
    name: GuildTreasuryVault
    network: arbitrum-sepolia
    source:
      address: "0xbb2db02389cB4C90956FCb9018f04fe96d51D502"
      abi: GuildTreasuryVaultV1
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VaultDayData
      abis:
        - name: GuildTreasuryVaultV1
          file: ./abis/GuildTreasuryVaultV1.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
      file: ./src/vault.ts

  - kind: ethereum
    name: ItemRentalVault
    network: arbitrum-sepolia
    source:
      address: "0x1e7CBF8C16654AdA9D74b83F1c0E9c25310142dc"
      abi: ItemRentalVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - RentalActivity
      abis:
        - name: ItemRentalVault
          file: ./abis/ItemRentalVault.json
      eventHandlers:
        - event: ItemListed(indexed uint256,indexed address,indexed uint256,uint256,uint256,uint64)
          handler: handleItemListed
        - event: ItemRented(indexed uint256,indexed uint256,indexed address,uint64,uint256,uint256)
          handler: handleItemRented
        - event: RentalEnded(indexed uint256,indexed uint256,indexed address)
          handler: handleRentalEnded
        - event: ListingCancelled(indexed uint256,indexed address)
          handler: handleListingCancelled
      file: ./src/rental.ts
