type Swap @entity(immutable: true) {
  id: String!
  sender: Bytes!
  tokenIn: Bytes!
  tokenOut: Bytes!
  amountIn: BigInt!
  amountOut: BigInt!
  to: Bytes!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

type Proposal @entity(immutable: false) {
  id: String!
  proposalId: BigInt!
  proposer: Bytes!
  description: String!
  status: String!
  forVotes: BigInt!
  againstVotes: BigInt!
  abstainVotes: BigInt!
  voteStart: BigInt!
  voteEnd: BigInt!
  createdAt: BigInt!
  executedAt: BigInt
  canceledAt: BigInt
}

type Vote @entity(immutable: true) {
  id: String!
  proposal: Proposal!
  voter: Bytes!
  support: Int!
  weight: BigInt!
  reason: String!
  timestamp: BigInt!
  txHash: Bytes!
}

type TokenHolder @entity(immutable: false) {
  id: String!
  address: Bytes!
  balance: BigInt!
  votingPower: BigInt!
  delegate: Bytes
}

type LootDrop @entity(immutable: false) {
  id: String!
  requester: Bytes!
  requestId: BigInt!
  itemGranted: BigInt
  randomness: BigInt
  feePaid: BigInt!
  fulfilled: Boolean!
  requestedAt: BigInt!
  fulfilledAt: BigInt
  txHash: Bytes!
}

type CraftingEvent @entity(immutable: true) {
  id: String!
  user: Bytes!
  recipeId: BigInt!
  amount: BigInt!
  outputItemId: BigInt!
  outputAmount: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

type VaultDayData @entity(immutable: false) {
  id: String!
  date: Int!
  totalAssets: BigInt!
  totalSupply: BigInt!
  pricePerShare: BigDecimal!
  lastUpdatedAt: BigInt!
}

type RentalActivity @entity(immutable: true) {
  id: String!
  eventType: String!
  listingId: BigInt!
  rentalId: BigInt
  lender: Bytes
  renter: Bytes
  itemId: BigInt
  amount: BigInt
  pricePerDay: BigInt
  duration: BigInt
  totalPayment: BigInt
  protocolFee: BigInt
  status: String!
  timestamp: BigInt!
  txHash: Bytes!
}
