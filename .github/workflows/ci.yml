name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Smart Contracts ────────────────────────────────────────────────────────
  contracts:
    name: Contracts (Foundry)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Check formatting
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

      - name: Run tests (fuzz + invariant)
        run: forge test --profile ci -v

      - name: Coverage report
        continue-on-error: true
        run: |
          mkdir -p coverage
          forge coverage --report summary

  # ── Slither security scan ──────────────────────────────────────────────────
  slither:
    name: Slither Security Scan
    runs-on: ubuntu-latest
    needs: contracts

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build for Slither
        run: forge build --build-info

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        id: slither
        with:
          target: "src/"
          slither-args: "--exclude-dependencies"
          fail-on: high
          sarif: results.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif

  # ── Solhint linting ────────────────────────────────────────────────────────
  solhint:
    name: Solhint Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install solhint
        run: npm install -g solhint

      - name: Lint contracts
        run: solhint "src/**/*.sol" "script/**/*.sol"

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Vite + ESLint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-fund --no-audit
        working-directory: frontend

      - name: Prettier check
        run: npx prettier --check "src/**/*.{js,jsx,css}"
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

      - name: Build (production)
        run: npm run build
        working-directory: frontend
